<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drawwww - Skribbl-Inspired Theme</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Chewy', 'cursive'],
            sans: ['Nunito', 'sans-serif'],
          },
          colors: {
            'skribbl-bg-top': '#2c6cb5',
            'skribbl-bg-bottom': '#1f5394',
            'skribbl-panel': '#1e387c',
            'skribbl-green': '#5cd65c',
            'skribbl-green-dark': '#48a848',
            'skribbl-blue': '#3897f0',
            'skribbl-blue-dark': '#246eb5',
          },
          animation: {
            'bounce-slow': 'bounce 3s infinite',
            'wiggle': 'wiggle 2s ease-in-out infinite',
          },
          keyframes: {
            wiggle: {
              '0%, 100%': { transform: 'rotate(-3deg)' },
              '50%': { transform: 'rotate(3deg)' },
            }
          }
        }
      }
    }
  </script>
  
  <style>
    /* Custom SVG Pattern Background to mimic doodles */
    body {
      background-color: #2c6cb5;
      background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 10c0-5 5-5 5-5s5 0 5 5-5 5-5 5-5 0-5-5zm20 30c5 0 5 5 5 5s0 5-5 5-5-5-5-5 0-5 5-5zm40-20c0 5-5 5-5 5s-5 0-5-5 5-5 5-5 5 0 5 5zm-30 50c-5 0-5-5-5-5s0-5 5-5 5 5 5 5 0 5-5 5zm50-10c0-5 5-5 5-5s5 0 5 5-5 5-5 5-5 0-5-5z' fill='rgba(0,0,0,0.06)' fill-rule='evenodd'/%3E%3C/svg%3E");
    }

    /* Gradient split background */
    .bg-split {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(180deg, transparent 65%, #1f5394 65%);
      z-index: -1;
    }

    /* Chunky Buttons with 3D bottom border */
    .chunky-btn {
      transition: transform 0.1s;
    }
    .chunky-btn:active {
      transform: translateY(4px);
    }
    
    .btn-green {
      background-color: #5cd65c;
      border-bottom: 5px solid #48a848;
      color: white;
      text-shadow: 1px 1px 0px rgba(0,0,0,0.3);
    }
    .btn-green:active { border-bottom: 1px solid #48a848; }

    .btn-blue {
      background-color: #3897f0;
      border-bottom: 5px solid #246eb5;
      color: white;
      text-shadow: 1px 1px 0px rgba(0,0,0,0.3);
    }
    .btn-blue:active { border-bottom: 1px solid #246eb5; }

    /* Multicolor Logo Text with black outline */
    .logo-text span {
      text-shadow: 
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000,
         4px  4px 0 #000; /* Drop shadow */
    }
    
    .c1 { color: #ff3333; }
    .c2 { color: #ff9933; }
    .c3 { color: #ffff33; }
    .c4 { color: #33cc33; }
    .c5 { color: #33ccff; }
    .c6 { color: #9933ff; }
    .c7 { color: #ff33cc; }

  </style>
</head>
<body class="font-sans text-white h-screen flex flex-col relative overflow-hidden">
  
  <div class="bg-split"></div>

  <!-- ================= LOBBY DEMO ================= -->
  <div id="lobby" class="flex-1 flex flex-col items-center justify-center p-6 relative z-10">
    
    <!-- Cartoon Logo -->
    <div class="flex items-center gap-2 mb-10 animate-wiggle">
      <h1 class="font-display text-7xl tracking-wide logo-text flex">
        <span class="c1">D</span>
        <span class="c2">r</span>
        <span class="c3">a</span>
        <span class="c4">w</span>
        <span class="c5">w</span>
        <span class="c6">w</span>
        <span class="c7">w</span>
      </h1>
      <i data-lucide="pencil" class="w-12 h-12 text-yellow-400 fill-yellow-400 mt-4" style="filter: drop-shadow(2px 2px 0 black);"></i>
    </div>

    <!-- Main Panel -->
    <div class="bg-skribbl-panel rounded-lg p-6 w-full max-w-sm shadow-xl flex flex-col gap-4 border-2 border-[#16295c]">
      
      <!-- Input -->
      <input type="text" placeholder="Enter your name" value="Bob Ross" class="w-full text-center px-4 py-3 rounded text-black font-bold text-lg outline-none border-4 border-transparent focus:border-skribbl-blue placeholder-gray-400">

      <!-- Avatar Preview Box -->
      <div class="bg-[#152758] rounded p-4 flex items-center justify-between">
        <button class="text-white hover:text-gray-300"><i data-lucide="chevron-left" class="w-8 h-8"></i></button>
        <div class="w-24 h-24 bg-white/10 rounded-lg flex items-center justify-center">
          <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Felix&backgroundColor=transparent" class="w-20 h-20">
        </div>
        <button class="text-white hover:text-gray-300"><i data-lucide="chevron-right" class="w-8 h-8"></i></button>
      </div>

      <!-- Action Buttons -->
      <button onclick="toggleView()" class="chunky-btn btn-green w-full py-4 rounded text-3xl font-bold tracking-wide mt-2">
        Play!
      </button>

      <button onclick="toggleView()" class="chunky-btn btn-blue w-full py-3 rounded text-xl font-bold tracking-wide mt-1">
        Create Private Room
      </button>

      <!-- Join Room Input (Added for Drawwww functionality) -->
      <div class="flex gap-2 mt-4 pt-4 border-t border-white/10">
        <input type="text" placeholder="Room ID" class="flex-1 text-center px-4 py-2 rounded text-black font-bold outline-none uppercase">
        <button onclick="toggleView()" class="chunky-btn btn-blue px-4 rounded text-lg font-bold">
          Join
        </button>
      </div>
    </div>
  </div>


  <!-- ================= STUDIO DEMO (Hidden initially) ================= -->
  <div id="studio" class="hidden flex-1 flex-col w-full h-full bg-white relative z-10">
    
    <!-- Top Header Bar (skribbl style) -->
    <div class="w-full h-16 bg-[#2c6cb5] flex items-center justify-between px-6 border-b-4 border-[#1f5394] z-20 shadow-md text-white">
      <!-- Logo Small -->
      <div class="font-display text-3xl tracking-wider logo-text flex">
        <span class="c1">D</span><span class="c2">r</span><span class="c3">a</span><span class="c4">w</span><span class="c5">w</span><span class="c6">w</span><span class="c7">w</span>
      </div>

      <!-- Round Info -->
      <div class="flex items-center gap-8 font-bold text-xl">
        <div class="bg-white/20 px-4 py-1 rounded">ROOM: <span class="text-yellow-400 uppercase">MAGIC</span></div>
      </div>

      <!-- Settings / Return -->
      <button onclick="toggleView()" class="chunky-btn bg-red-500 border-b-4 border-red-700 text-white px-4 py-2 rounded font-bold shadow-md flex items-center gap-2">
        <i data-lucide="log-out" class="w-5 h-5"></i> Leave
      </button>
    </div>

    <!-- Main Workspace -->
    <div class="flex-1 flex overflow-hidden">
      
      <!-- Left sidebar: Players -->
      <div class="w-64 bg-gray-100 border-r-2 border-gray-300 flex flex-col p-4 gap-3 overflow-y-auto">
        <h3 class="text-gray-500 font-black uppercase text-sm tracking-wider mb-2">Players</h3>
        
        <!-- Host -->
        <div class="bg-white rounded border-2 border-gray-200 p-2 flex items-center gap-3 shadow-sm relative">
          <div class="absolute -top-3 -right-2 text-xl drop-shadow">👑</div>
          <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Felix&backgroundColor=transparent" class="w-10 h-10 bg-gray-100 rounded">
          <div class="flex flex-col text-black">
            <span class="font-bold leading-tight">Felix (You)</span>
            <span class="text-xs text-gray-500 font-bold">Host</span>
          </div>
        </div>

        <!-- Guest -->
        <div class="bg-white rounded border-2 border-gray-200 p-2 flex items-center justify-between shadow-sm group">
          <div class="flex items-center gap-3 text-black">
            <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Bella&backgroundColor=transparent" class="w-10 h-10 bg-gray-100 rounded">
            <span class="font-bold leading-tight">Bella</span>
          </div>
          <!-- Kick button hidden until hover -->
          <button class="hidden group-hover:block text-red-500 hover:scale-110 transition-transform">
            <i data-lucide="user-minus" class="w-5 h-5"></i>
          </button>
        </div>
      </div>

      <!-- Canvas Area -->
      <div class="flex-1 bg-white relative flex flex-col">
        <!-- Canvas simulation -->
        <div class="flex-1 w-full h-full cursor-crosshair"></div>
        
        <!-- Toolbar (bottom anchored like skribbl) -->
        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-gray-200 border-4 border-gray-300 rounded-lg p-2 flex items-center gap-2 shadow-lg">
          
          <!-- Colors -->
          <div class="grid grid-cols-5 gap-1 mr-4 border-r-2 border-gray-300 pr-4">
            <button class="w-8 h-8 rounded-full bg-red-500 border-2 border-transparent hover:border-white shadow-sm hover:scale-110 transition-transform"></button>
            <button class="w-8 h-8 rounded-full bg-orange-500 border-2 border-transparent hover:border-white shadow-sm hover:scale-110 transition-transform"></button>
            <button class="w-8 h-8 rounded-full bg-yellow-400 border-2 border-transparent hover:border-white shadow-sm hover:scale-110 transition-transform"></button>
            <button class="w-8 h-8 rounded-full bg-green-500 border-2 border-transparent hover:border-white shadow-sm hover:scale-110 transition-transform"></button>
            <button class="w-8 h-8 rounded-full bg-blue-500 border-2 border-transparent hover:border-white shadow-sm hover:scale-110 transition-transform"></button>
            <button class="w-8 h-8 rounded-full bg-purple-500 border-2 border-transparent hover:border-white shadow-sm hover:scale-110 transition-transform"></button>
            <button class="w-8 h-8 rounded-full bg-pink-500 border-2 border-transparent hover:border-white shadow-sm hover:scale-110 transition-transform"></button>
            <button class="w-8 h-8 rounded-full bg-black border-2 border-white shadow-sm hover:scale-110 transition-transform"></button>
            <button class="w-8 h-8 rounded-full bg-gray-500 border-2 border-transparent hover:border-white shadow-sm hover:scale-110 transition-transform"></button>
            <button class="w-8 h-8 rounded-full bg-white border-2 border-gray-300 hover:border-white shadow-sm hover:scale-110 transition-transform"></button>
          </div>

          <!-- Tools -->
          <div class="flex gap-2">
            <button class="w-10 h-10 bg-white rounded border-2 border-gray-300 flex items-center justify-center text-black hover:bg-gray-100 hover:scale-105 transition-transform"><i data-lucide="pencil" class="w-5 h-5"></i></button>
            <button class="w-10 h-10 bg-white rounded border-2 border-gray-300 flex items-center justify-center text-black hover:bg-gray-100 hover:scale-105 transition-transform"><i data-lucide="eraser" class="w-5 h-5"></i></button>
            <button class="w-10 h-10 bg-white rounded border-2 border-gray-300 flex items-center justify-center text-black hover:bg-gray-100 hover:scale-105 transition-transform"><i data-lucide="paint-bucket" class="w-5 h-5"></i></button>
            <button class="w-10 h-10 bg-red-100 rounded border-2 border-red-300 flex items-center justify-center text-red-500 hover:bg-red-200 hover:scale-105 transition-transform ml-2"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();
    
    function toggleView() {
      const lobby = document.getElementById('lobby');
      const studio = document.getElementById('studio');
      
      if (lobby.classList.contains('hidden')) {
        lobby.classList.remove('hidden');
        lobby.classList.add('flex');
        studio.classList.add('hidden');
      } else {
        lobby.classList.add('hidden');
        lobby.classList.remove('flex');
        studio.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
